# Default configurations for the reservoir simulation
defaults:
  - task: random
  - _self_
hydra:
  job:
    chdir: True  # これをTrueにすると、プログラム実行中に自動でoutputs/...に移動します

# Shared parameters across different tasks and models
num_states: 100
reg: 1e-7
record_target: "calcium_acum" # Target variable for recording (e.g., potential, calcium_acum)
plot_all: true                # Flag to enable detailed plotting of all variables
bin_width: 0.5                # Time resolution for binning (ms)
seed: 1234                    # Random seed for reproducibility
exc_syn_weight: 0.0005
exc_syn_tau1: 1               # Added: Required for synapse initialization
exc_syn_tau2: 5               # Added: Required for synapse initialization
condition: "distal-dense"
